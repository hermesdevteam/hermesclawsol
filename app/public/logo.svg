<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <linearGradient id="wing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)"/>
  <!-- H letter - stylized as Hermes helmet shape -->
  <path d="M160 160 L160 352 L200 352 L200 272 L312 272 L312 352 L352 352 L352 160 L312 160 L312 232 L200 232 L200 160 Z" fill="white"/>
  <!-- Left wing -->
  <path d="M120 180 Q80 140 60 160 Q40 180 70 210 Q90 200 120 200 Z" fill="url(#wing)" opacity="0.9"/>
  <path d="M110 200 Q65 170 50 195 Q35 220 75 235 Q90 220 110 215 Z" fill="url(#wing)" opacity="0.7"/>
  <!-- Right wing -->
  <path d="M392 180 Q432 140 452 160 Q472 180 442 210 Q422 200 392 200 Z" fill="url(#wing)" opacity="0.9"/>
  <path d="M402 200 Q447 170 462 195 Q477 220 437 235 Q422 220 402 215 Z" fill="url(#wing)" opacity="0.7"/>
  <!-- Claw marks (3 diagonal slashes bottom right) -->
  <path d="M340 310 L370 360" stroke="#0a0a0f" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
  <path d="M355 305 L385 355" stroke="#0a0a0f" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
  <path d="M370 300 L400 350" stroke="#0a0a0f" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
  <!-- Circuit dots -->
  <circle cx="180" cy="380" r="4" fill="white" opacity="0.5"/>
  <circle cx="200" cy="395" r="3" fill="white" opacity="0.4"/>
  <circle cx="220" cy="385" r="4" fill="white" opacity="0.5"/>
  <circle cx="240" cy="400" r="3" fill="white" opacity="0.3"/>
  <!-- Circuit lines -->
  <line x1="180" y1="380" x2="200" y2="395" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="395" x2="220" y2="385" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="220" y1="385" x2="240" y2="400" stroke="white" stroke-width="1" opacity="0.3"/>
</svg>
